<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Test de vue Snellen à la maison : acuité visuelle estimée avec calibration par carte de crédit et distance mesurée par la tache aveugle. Home Snellen eye test with credit-card calibration and blind-spot distance measurement.">
  <meta name="theme-color" content="#f4f6f8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#12161b" media="(prefers-color-scheme: dark)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Test Snellen - Mathias">
  <meta property="og:description" content="Test de vue Snellen à la maison — calibration par carte de crédit, distance mesurée par la tache aveugle, résultats Snellen / LogMAR. Home Snellen vision test in your browser.">
  <meta property="og:url" content="https://mathiassalvas.github.io/snellen/">
  <title>Test Snellen - Mathias</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <!-- La police optotype est en font-display: block (pas de glyphe de repli
       pendant un test de vue) : la précharger évite d'attendre CSS → premier
       usage pour la découvrir. -->
  <link rel="preload" href="fonts/Optician-Sans.woff2" as="font" type="font/woff2" crossorigin>
  <!-- Résolution DNS anticipée pour le suivi caméra optionnel (modèle MediaPipe). -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://storage.googleapis.com">
  <link rel="stylesheet" href="style.css?v=20260719-ui2">
  <script src="app.js?v=20260719-ui2" defer></script>
</head>
<body>

  <noscript>
    <p style="max-width:760px;margin:2rem auto;padding:1rem 1.25rem;border:1px solid #f0c36d;background:#fff7e6;border-radius:8px;color:#1a222c;">
      Ce test nécessite JavaScript pour fonctionner. / This test requires JavaScript to run.
    </p>
  </noscript>

  <div id="flow-progress" aria-hidden="true"><span id="flow-progress-fill"></span></div>

  <div id="lang-toggle">
    <button class="btn small" id="btn-lang-fr" data-lang="fr">FR</button>
    <button class="btn small" id="btn-lang-en" data-lang="en">EN</button>
  </div>

  <!-- ÉTAPE 0 : Accueil / Home -->
  <section id="step-intro" class="step active">
    <div class="intro-bg" aria-hidden="true"></div>
    <div class="card">
      <h1 data-i18n="intro.title"></h1>
      <p class="lead" data-i18n="intro.lead"></p>
      <ol class="steps-list">
        <li data-i18n="intro.step1"></li>
        <li data-i18n="intro.step2"></li>
        <li data-i18n="intro.step3"></li>
      </ol>
      <div class="warning" data-i18n="intro.warning"></div>
      <p class="hint" data-i18n="intro.need"></p>
      <button class="btn primary" id="btn-start" data-i18n="intro.start"></button>
    </div>
  </section>

  <!-- ÉTAPE 1 : Calibration -->
  <section id="step-calibrate" class="step">
    <div class="card">
      <h2 data-i18n="cal.title"></h2>
      <p data-i18n="cal.instructions"></p>
    </div>

    <div id="card-zone">
      <div id="credit-card">
        <div class="corner-mark top-left"></div>
        <div class="corner-mark top-right"></div>
        <div class="corner-mark bottom-left"></div>
        <div class="corner-mark bottom-right"></div>
        <div class="cc-chip"></div>
        <div class="cc-number">•••• •••• •••• ••••</div>
      </div>
    </div>

    <div class="card controls">
      <input type="range" id="card-slider" min="200" max="1200" step="1" value="500">
      <div class="fine-controls">
        <button class="btn small" id="card-minus" data-i18n="cal.smaller"></button>
        <button class="btn small" id="card-plus" data-i18n="cal.larger"></button>
      </div>
      <p class="hint" data-i18n="cal.tip"></p>
      <button class="btn primary" id="btn-calibrated" data-i18n="cal.done"></button>
    </div>
  </section>

  <!-- ÉTAPE 2 : Choix du test / Test choice -->
  <section id="step-mode" class="step">
    <div class="card">
      <h2 data-i18n="mode.title"></h2>
      <p data-i18n="mode.text"></p>

      <h3 data-i18n="mode.typeLabel"></h3>
      <div class="mode-choices" id="mode-type-choices">
        <button class="btn mode-choice" data-testmode="chart">
          <strong data-i18n="mode.chartTitle"></strong>
          <span data-i18n="mode.chartText"></span>
        </button>
        <button class="btn mode-choice selected" data-testmode="tumblingE">
          <strong data-i18n="mode.eTitle"></strong>
          <span data-i18n="mode.eText"></span>
        </button>
        <button class="btn mode-choice" data-testmode="letters">
          <strong data-i18n="mode.lettersTitle"></strong>
          <span data-i18n="mode.lettersText"></span>
        </button>
      </div>

      <h3 data-i18n="mode.eyesLabel"></h3>
      <div class="mode-choices" id="mode-eyes-choices">
        <button class="btn mode-choice selected" data-eyemode="monocular">
          <strong data-i18n="mode.monoTitle"></strong>
          <span data-i18n="mode.monoText"></span>
        </button>
        <button class="btn mode-choice" data-eyemode="binocular">
          <strong data-i18n="mode.biTitle"></strong>
          <span data-i18n="mode.biText"></span>
        </button>
        <button class="btn mode-choice" data-eyemode="complete">
          <strong data-i18n="mode.completeTitle"></strong>
          <span data-i18n="mode.completeText"></span>
        </button>
      </div>

      <button class="btn primary" id="btn-mode-next" data-i18n="mode.next"></button>
    </div>
  </section>

  <!-- ÉTAPE 3b : Distance mesurée manuellement (mode chart) / Manually measured distance -->
  <section id="step-manual-distance" class="step">
    <div class="card">
      <h2 data-i18n="manual.title"></h2>
      <p data-i18n="manual.text"></p>
      <label class="range-label" for="manual-distance-input">
        <span data-i18n="manual.inputLabel"></span>
      </label>
      <div id="manual-distance-input-row">
        <input type="number" id="manual-distance-input" min="30" max="1000" step="1" value="150">
        <span>cm</span>
      </div>
      <p class="hint" id="manual-distance-warning"></p>
      <button class="btn primary" id="btn-manual-distance-next" data-i18n="manual.next"></button>
    </div>
  </section>

  <!-- ÉTAPE 4 : Choix de l'œil / Eye choice -->
  <section id="step-eye" class="step">
    <div class="card">
      <h2 id="eye-title"></h2>
      <p data-i18n="dist.choose"></p>
      <p id="eye-p1"></p>
      <p id="eye-p2"></p>

      <div class="warning" data-i18n="eye.displayConditions"></div>

      <div id="camera-card" class="collapsible">
        <div class="collapsible-header">
          <h3 data-i18n="cam.title"></h3>
          <div class="collapsible-actions">
            <button class="btn small" id="btn-cam-enable" data-i18n="cam.enable"></button>
            <button type="button" class="collapse-toggle" id="camera-toggle" aria-expanded="false" aria-controls="camera-body">▼</button>
          </div>
        </div>
        <div id="camera-body" class="collapsible-body" hidden>
          <p class="hint" data-i18n="cam.text"></p>
        </div>
        <video id="cam-video" autoplay playsinline muted hidden></video>
        <p class="hint" id="cam-status" aria-live="polite"></p>
      </div>

      <div id="mic-card" class="collapsible">
        <div class="collapsible-header">
          <h3 data-i18n="mic.title"></h3>
          <div class="collapsible-actions">
            <button class="btn small" id="btn-mic-enable" data-i18n="mic.enable"></button>
            <button type="button" class="collapse-toggle" id="mic-toggle" aria-expanded="false" aria-controls="mic-body">▼</button>
          </div>
        </div>
        <div id="mic-body" class="collapsible-body" hidden>
          <p class="hint" data-i18n="mic.text"></p>
          <p class="hint small" data-i18n="mic.textNote"></p>
        </div>
        <p class="hint" id="mic-status" aria-live="polite"></p>
        <p class="hint" id="mic-expected-words"></p>
        <div id="mic-practice-row" hidden>
          <span id="mic-practice-label" data-i18n="mic.tryItLabel"></span>
          <span id="mic-practice-feedback"></span>
        </div>
      </div>

      <div class="eye-choices">
        <button class="btn primary" id="btn-first-pass"></button>
      </div>
    </div>
  </section>

  <!-- ÉTAPE 5 : Tache aveugle / Blind spot -->
  <section id="step-blindspot" class="step">
    <div class="bs-eye-side left" id="bs-eye-left" aria-hidden="true">
      <svg class="eye-open" viewBox="0 0 120 72" focusable="false">
        <path d="M8 36 C24 12 42 6 60 6 C78 6 96 12 112 36 C96 60 78 66 60 66 C42 66 24 60 8 36 Z"/>
        <circle cx="60" cy="36" r="15"/>
        <circle cx="60" cy="36" r="6"/>
      </svg>
      <svg class="eye-closed" viewBox="0 0 120 72" focusable="false">
        <path d="M12 38 C30 56 50 62 70 58 C86 55 99 47 108 36"/>
        <path d="M34 54 L28 65 M58 60 L57 72 M82 54 L90 65"/>
      </svg>
      <span></span>
    </div>
    <div class="bs-eye-side right" id="bs-eye-right" aria-hidden="true">
      <svg class="eye-open" viewBox="0 0 120 72" focusable="false">
        <path d="M8 36 C24 12 42 6 60 6 C78 6 96 12 112 36 C96 60 78 66 60 66 C42 66 24 60 8 36 Z"/>
        <circle cx="60" cy="36" r="15"/>
        <circle cx="60" cy="36" r="6"/>
      </svg>
      <svg class="eye-closed" viewBox="0 0 120 72" focusable="false">
        <path d="M12 38 C30 56 50 62 70 58 C86 55 99 47 108 36"/>
        <path d="M34 54 L28 65 M58 60 L57 72 M82 54 L90 65"/>
      </svg>
      <span></span>
    </div>
    <div class="card">
      <h2 id="blindspot-title"></h2>

      <div id="bs-camera-skip" hidden>
        <p class="hint" id="bs-camera-skip-text"></p>
        <button class="btn small" id="btn-bs-remeasure" data-i18n="dist.remeasureBtn"></button>
      </div>

      <div id="blindspot-eye-box"></div>
      <p class="hint" id="cam-eye-hint-bs"></p>
      <div id="head-align-card">
        <svg id="head-align-graphic" viewBox="0 0 420 180" aria-hidden="true" focusable="false">
          <line class="center-reference" x1="210" y1="0" x2="210" y2="180"/>
          <rect class="screen-frame" x="118" y="18" width="184" height="104" rx="8"/>
          <line class="screen-midline" x1="210" y1="18" x2="210" y2="122"/>
          <circle class="center-dot" cx="210" cy="18" r="8"/>
          <circle class="head-shape" cx="210" cy="146" r="26"/>
          <path class="shoulders-shape" d="M152 174 C164 150 185 142 210 142 C235 142 256 150 268 174"/>
          <line class="align-line" x1="210" y1="122" x2="210" y2="146"/>
          <path class="side-arrow left" d="M82 146 H158"/>
          <path class="side-arrow right" d="M338 146 H262"/>
          <path class="arrow-head left" d="M92 136 L82 146 L92 156"/>
          <path class="arrow-head right" d="M328 136 L338 146 L328 156"/>
        </svg>
        <div>
          <strong data-i18n="dist.headAlignTitle"></strong>
          <p data-i18n="dist.headAlignText"></p>
        </div>
      </div>
      <div id="bs-progress-box">
        <strong id="bs-progress-count">0/5</strong>
        <span id="bs-progress-text"></span>
      </div>
      <div id="mic-badge-row-bs" hidden>
        <span id="mic-badge-bs"><span id="mic-badge-bs-text"></span></span>
      </div>
      <div id="blindspot-text"></div>
      <p class="hint" id="test-distance-note"></p>
      <div class="bs-controls" id="bs-measure-controls">
        <button class="btn" id="btn-bs-start" data-i18n="dist.blindStart"></button>
      </div>
      <p class="hint" id="bs-status" aria-live="polite"></p>
      <p id="bs-result" aria-live="polite"></p>
    </div>

    <div id="bs-zone" hidden>
      <div id="bs-zone-instruction"></div>
      <div id="bs-cross">+</div>
      <div id="bs-dot"></div>
      <div id="bs-dot-confirm"></div>
    </div>
    <div class="bs-gone-controls" id="bs-gone-controls" hidden>
      <button class="btn primary" id="btn-bs-gone" data-i18n="dist.blindGone"></button>
    </div>

    <div class="card controls">
      <button class="btn primary" id="btn-start-eye-test" data-i18n="dist.startEyeTest" disabled></button>
      <p class="hint" id="bs-stay-hint" data-i18n="dist.blindStay"></p>
    </div>
  </section>

  <!-- ÉTAPE 6 : Test -->
  <section id="step-test" class="step">
    <div class="bs-eye-side test-eye-side left" id="test-eye-left-side" aria-hidden="true">
      <svg class="eye-open" viewBox="0 0 120 72" focusable="false">
        <path d="M8 36 C24 12 42 6 60 6 C78 6 96 12 112 36 C96 60 78 66 60 66 C42 66 24 60 8 36 Z"/>
        <circle cx="60" cy="36" r="15"/>
        <circle cx="60" cy="36" r="6"/>
      </svg>
      <svg class="eye-closed" viewBox="0 0 120 72" focusable="false">
        <path d="M12 38 C30 56 50 62 70 58 C86 55 99 47 108 36"/>
        <path d="M34 54 L28 65 M58 60 L57 72 M82 54 L90 65"/>
      </svg>
      <span></span>
    </div>
    <div class="bs-eye-side test-eye-side right" id="test-eye-right-side" aria-hidden="true">
      <svg class="eye-open" viewBox="0 0 120 72" focusable="false">
        <path d="M8 36 C24 12 42 6 60 6 C78 6 96 12 112 36 C96 60 78 66 60 66 C42 66 24 60 8 36 Z"/>
        <circle cx="60" cy="36" r="15"/>
        <circle cx="60" cy="36" r="6"/>
      </svg>
      <svg class="eye-closed" viewBox="0 0 120 72" focusable="false">
        <path d="M12 38 C30 56 50 62 70 58 C86 55 99 47 108 36"/>
        <path d="M34 54 L28 65 M58 60 L57 72 M82 54 L90 65"/>
      </svg>
      <span></span>
    </div>
    <div id="test-header">
      <span id="test-eye-label"></span>
      <span id="test-line-label"></span>
    </div>
    <div id="cam-badges" hidden>
      <span id="cam-badge" hidden><span id="cam-badge-text"></span></span>
      <span id="cam-badge-angle" hidden><span id="cam-badge-angle-text"></span></span>
      <span id="cam-badge-eye" hidden><span id="cam-badge-eye-text"></span></span>
    </div>
    <div id="mic-badge-row" hidden>
      <span id="mic-badge"><span id="mic-badge-text"></span></span>
    </div>
    <div id="test-align-warning" data-i18n="test.headAlignReminder"></div>
    <p class="hint" id="test-precision-note"></p>
    <div id="cam-reject-banner" role="alert" hidden></div>
    <div id="optotype-zone">
      <div id="crowding-frame">
        <span class="crowding-bar top" aria-hidden="true"></span>
        <span class="crowding-bar right" aria-hidden="true"></span>
        <span class="crowding-bar bottom" aria-hidden="true"></span>
        <span class="crowding-bar left" aria-hidden="true"></span>
        <svg id="optotype" viewBox="0 0 5 5" aria-label="optotype E">
          <g id="optotype-g">
            <path d="M0,0 H5 V1 H1 V2 H5 V3 H1 V4 H5 V5 H0 Z" fill="currentColor"/>
          </g>
        </svg>
        <div id="letter-optotype" aria-label="letter optotype"></div>
      </div>
    </div>
    <div id="answer-pad-e" class="answer-pad">
      <p class="hint" data-i18n="test.question"></p>
      <div class="arrow-grid">
        <button class="btn arrow" data-dir="up"    aria-label="up">▲</button>
        <button class="btn arrow" data-dir="left"  aria-label="left">◀</button>
        <button class="btn arrow" data-dir="down"  aria-label="down">▼</button>
        <button class="btn arrow" data-dir="right" aria-label="right">▶</button>
      </div>
      <button class="btn ghost" id="btn-cant-see" data-i18n="test.cantSee"></button>
    </div>
    <div id="answer-pad-letters" class="answer-pad" hidden>
      <p class="hint" data-i18n="test.letterQuestion"></p>
      <div id="letter-grid"></div>
      <button class="btn ghost" id="btn-cant-read" data-i18n="test.cantRead"></button>
    </div>
  </section>

  <!-- ÉTAPE 6b : Tableau Snellen complet (mode chart) / Full Snellen chart -->
  <section id="step-chart" class="step">
    <div id="chart-header">
      <span id="chart-eye-label"></span>
    </div>
    <p class="hint" id="chart-instructions"></p>
    <p class="hint" id="chart-precision-note"></p>
    <div id="chart-scroll">
      <div id="chart-rows"></div>
    </div>
    <div class="card controls">
      <p class="hint" data-i18n="chart.question"></p>
      <div id="chart-line-buttons"></div>
      <button class="btn ghost" id="btn-chart-none" data-i18n="chart.none"></button>
    </div>
  </section>

  <!-- Interlude entre les deux yeux / Switch eyes -->
  <section id="step-switch" class="step">
    <div class="card">
      <h2 data-i18n="switch.title"></h2>
      <p id="switch-result"></p>
      <p id="switch-text"></p>
      <button class="btn primary" id="btn-second-pass" data-i18n="switch.btn"></button>
    </div>
  </section>

  <!-- ÉTAPE 7 : Résultats / Results -->
  <section id="step-results" class="step">
    <div class="card">
      <h2 data-i18n="results.title"></h2>
      <p class="hint" id="results-distance"></p>
      <table id="results-table">
        <thead>
          <tr>
            <th></th>
            <th data-i18n="results.thSnellenM"></th>
            <th data-i18n="results.thSnellenFt"></th>
            <th data-i18n="results.thDecimal"></th>
            <th data-i18n="results.thLogmar"></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="warning" id="results-precision-warning" hidden></div>
      <p id="results-comment"></p>
      <div class="warning" data-i18n="results.warning"></div>
      <button class="btn primary" id="btn-restart" data-i18n="results.restart"></button>
    </div>
  </section>

  <footer>
    <p data-i18n="footer.text"></p>
  </footer>

</body>
</html>
